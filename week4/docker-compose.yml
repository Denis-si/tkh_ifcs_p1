version: '3.8'

services:
  wordpress:
    image: wordpress:latest
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: supersecretpassword
      WORDPRESS_DB_NAME: wordpress
    networks:
      - frontend
      - backend
# INSTRUCTION: Add the 'networks' block below to connect this to frontend AND backend.

  db:
    image: mariadb:10.6
    environment:
      MARIADB_ROOT_PASSWORD: supersecretpassword
      MARIADB_DATABASE: wordpress
    networks:
      - backend
# INSTRUCTION: Add the 'networks' block below to connect this ONLY to the backend.

networks:
  frontend:
  backend:
    internal: true
